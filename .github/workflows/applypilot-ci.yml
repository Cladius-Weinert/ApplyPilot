name: ApplyPilot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project with dev dependencies
        run: python -m pip install -e '.[dev]'

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Run targeted lint checks
        run: ruff check src/ tests/ --select E9,F63,F7,F82

      - name: Run tests
        run: pytest tests/ -v

  repository-guardrails:
    name: Repository guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify project context files exist
        run: |
          test -f AGENTS.md
          test -f APPLYPILOT_MVP.md
          test -f CURRENT_STATUS.md
          test -f CODEX_PROMPT.md

      - name: Check for obvious committed private env files
        run: |
          if find . -maxdepth 3 -type f \( -name '.env' -o -name '*.pem' -o -name '*.key' \) | grep -q .; then
            echo 'Potential private credential file found. Remove it before merging.'
            find . -maxdepth 3 -type f \( -name '.env' -o -name '*.pem' -o -name '*.key' \)
            exit 1
          fi
